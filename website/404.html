<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="crate" viewBox="0 0 32 32">
    <rect x="3" y="3" width="26" height="26" rx="5" fill="#e8702a" stroke="#17140d" stroke-width="2.5"/>
    <path d="M3 3l26 26M29 3L3 29" stroke="#17140d" stroke-width="2"/>

<header class="menubar">
  <div class="wrap menubar-inner">
    <a class="brand" href="https://sethmorrowsoftware.github.io/Box2Dxt/" aria-label="Box2Dxt home">
      <svg width="24" height="24" aria-hidden="true"><use href="#crate"/></svg> Box2D<b>xt</b>

    <div class="menu-right">
      <a class="menu-ghost" href="https://github.com/SethMorrowSoftware/Box2Dxt" target="_blank" rel="noopener">GitHub</a>
    </div>

</header>

<main class="desktop">
  <div class="stack-deck">
    <div class="win stack-win">
      <div class="win-bar"><span class="win-box"></span><span class="win-stripes"></span><span class="win-title">Box2Dxt — ?</span><span class="win-box"></span></div>
      <div class="stack-body" style="height:auto">
        <section class="card" style="position:static;opacity:1;visibility:visible">
          <span class="cardnum">ERROR · 404</span>
          <h2 class="card-h" style="margin-top:14px">Card not found.</h2>
          <p class="card-lead">That card isn't in this stack — it may have been moved, or it never existed. Let's get you back.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="https://sethmorrowsoftware.github.io/Box2Dxt/">⌂ Back to the stack</a>
            <a class="btn" href="https://sethmorrowsoftware.github.io/Box2Dxt/docs/index.html">Open the manual</a>
          </div>
        </section>
      </div>
    </div>
  </div>
  <p class="deskfoot"><span>Box2Dxt · MIT licensed · built on Box2D © Erin Catto</span></p>
</main>
