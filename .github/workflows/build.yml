name: build

# Builds the native box2dxt shared library and runs the C smoke test on Linux,
# macOS and Windows. When a GitHub Release is published the per-OS binaries are
# attached to it — those are the canonical artifacts referenced by
# prebuilt/README.md. Pull requests and pushes to main get the same build + test
# gate (no release). You can also run it by hand (Actions ▸ build ▸ Run workflow)
# and give an existing release tag to attach binaries to it after the fact.

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Attach the built binaries to this existing release tag (e.g. dev-01). Leave blank to only build & test."
        required: false
        default: ""

concurrency:
  group: build-${{ github.ref }}-${{ github.event.inputs.release_tag }}
  cancel-in-progress: true

jobs:
  # Cheap gate: the examples embed a generated copy of the Kit; fail fast if it
  # has drifted from the canonical src/box2dxt-kit.livecodescript.
  embedded-kit:
    name: embedded Kit in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify examples embed the canonical Kit
        run: python3 tools/sync-embedded-kit.py --check

  build:
    name: build & smoke-test (${{ matrix.name }})
    needs: embedded-kit
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            # AVX2 off → SSE2 baseline, so the binary runs on any x86-64 CPU.
            cmake_args: -DBOX2D_AVX2=OFF
            lib: libbox2dxt.so
            asset: libbox2dxt-linux-x86_64.so
          - name: macos-universal
            os: macos-latest
            # Intel + Apple Silicon in one dylib; AVX2 off keeps the x86 slice portable.
            # The arch list is quoted so bash does not split on the ';'.
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DBOX2D_AVX2=OFF'
            lib: libbox2dxt.dylib
            asset: libbox2dxt-macos-universal.dylib
          - name: windows-x64
            os: windows-latest
            cmake_args: -DBOX2D_AVX2=OFF
            lib: box2dxt.dll
            asset: box2dxt-windows-x64.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBOX2DXT_BUILD_TESTS=ON ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Stage library
        shell: bash
        run: |
          mkdir -p dist
          # MSVC drops the DLL in build/Release/; single-config generators use build/.
          src="$(find build -maxdepth 2 -name '${{ matrix.lib }}' | head -n 1)"
          test -n "$src" || { echo "could not find ${{ matrix.lib }} under build/"; exit 1; }
          cp "$src" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # Gather the three binaries and attach them to the release — either the one that
  # was just published, or the tag passed to a manual run.
  release:
    name: attach binaries to the release
    needs: build
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Attaching binaries to release: $TAG"
          gh release upload "$TAG" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
